apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-shell-config
  namespace: agentic-shell
data:
  agent-pool.yml: |
    agents:
      planner:
        model: mistral-large-latest
        max_concurrent: 5
      executor:
        model: mistral-large-latest
        max_concurrent: 10
      coder:
        model: mistral-large-latest
        max_concurrent: 8
      debugger:
        model: mistral-large-latest
        max_concurrent: 4
      optimizer:
        model: mistral-large-latest
        max_concurrent: 2
      reflector:
        model: mistral-large-latest
        max_concurrent: 1
  
  tool-registry.yml: |
    tools:
      shell:
        type: system
        working_dir: /tmp
      kubernetes:
        type: system
        command: kubectl
      docker:
        type: system
        command: docker
      aws:
        type: cloud
      github:
        type: api
  
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
      - job_name: 'orchestrator'
        static_configs:
          - targets: ['orchestrator:8000']
      
      - job_name: 'agents'
        static_configs:
          - targets: 
            - 'planner:8001'
            - 'executor:8001'
            - 'coder:8001'
            - 'debugger:8001'
            - 'optimizer:8001'
            - 'reflector:8001'
      
      - job_name: 'redis'
        static_configs:
          - targets: ['redis:6379']
      
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres:9187']