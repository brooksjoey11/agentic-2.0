apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agentic-shell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: agentic-shell/orchestrator:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: agentic-shell-config
            - secretRef:
                name: agentic-shell-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
