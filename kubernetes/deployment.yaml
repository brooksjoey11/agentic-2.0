apiVersion: apps/v1
kind: Deployment
metadata:
  name: executor
  namespace: agentic-shell
  labels:
    app: agent
    agent-type: executor
spec:
  replicas: 5
  selector:
    matchLabels:
      app: agent
      agent-type: executor
  template:
    metadata:
      labels:
        app: agent
        agent-type: executor
    spec:
      containers:
      - name: executor
        image: agentic-shell/worker:latest
        env:
        - name: AGENT_TYPE
          value: executor
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: MISTRAL_API_KEY
        - name: REDIS_HOST
          value: redis
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: RABBITMQ_USER
          value: agentic
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: RABBITMQ_PASS
        - name: ENABLED_TOOLS
          value: "shell,kubernetes,docker,aws,github"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: docker-socket
          mountPath: /var/run/docker.sock
        - name: kube-config
          mountPath: /home/app/.kube
        - name: aws-config
          mountPath: /home/app/.aws
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: logs
        emptyDir: {}
      - name: docker-socket
        hostPath:
          path: /var/run/docker.sock
      - name: kube-config
        hostPath:
          path: /home/user/.kube
      - name: aws-config
        hostPath:
          path: /home/user/.aws
---
