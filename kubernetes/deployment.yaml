apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: agentic-shell
  labels:
    app: orchestrator
    component: core
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        component: core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: orchestrator
        image: agentic-shell/orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8000
          name: metrics
        env:
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: MISTRAL_API_KEY
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: POSTGRES_PASSWORD
        - name: RABBITMQ_PASS
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: RABBITMQ_PASS
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: agentic-shell-secrets
              key: JWT_SECRET
        - name: POSTGRES_HOST
          value: postgres
        - name: REDIS_HOST
          value: redis
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: ETCD_HOST
          value: etcd
        - name: CONSUL_HOST
          value: consul
        volumeMounts:
        - name: config
          mountPath: /app/configs
        - name: logs
          mountPath: /app/logs
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: agentic-shell-config
      - name: logs
        emptyDir: {}
---
